name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip \
            python3-venv \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            libffi-dev \
            libssl-dev \
            autoconf \
            libtool \
            pkg-config

      - name: Install Python tools
        run: |
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip install buildozer cython --break-system-packages

      - name: Build APK
        run: |
          cd supercalc_mobile
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: supercalc-apk
          path: supercalc_mobile/bin/*.apk
