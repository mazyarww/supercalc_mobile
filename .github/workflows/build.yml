name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Build
      uses: ArtemSBulgakov/buildozer-action@v1
      with:
        workdir: supercalc_mobile
        command: buildozer android debug


    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: supercalc-apk
        path: supercalc_mobile/bin/*.apk
